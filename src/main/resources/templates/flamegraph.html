<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thread Dump Flame Graph</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/d3-flame-graph@4/dist/d3-flamegraph.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #fff;
            color: #333;
        }
        h1 {
            font-size: 1.4em;
            margin: 0 0 4px 0;
        }
        .subtitle {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 16px;
        }
        .toolbar {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #search {
            padding: 6px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.9em;
            width: 300px;
        }
        button {
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-size: 0.9em;
        }
        button:hover { background: #e8e8e8; }
        #chart { margin-top: 8px; }
        #details {
            font-size: 0.9em;
            color: #555;
            min-height: 1.4em;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>Thread Dump Flame Graph</h1>
    <div class="subtitle">/* __SUBTITLE__ */</div>
    <div class="toolbar">
        <input type="text" id="search" placeholder="Search frames...">
        <button id="clear">Clear</button>
        <button id="reset">Reset zoom</button>
    </div>
    <div id="chart"></div>
    <div id="details"></div>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-flame-graph@4/dist/d3-flamegraph.min.js"></script>
    <script>
        const data = /* __FLAMEGRAPH_DATA__ */null;

        const chart = flamegraph()
            .width(document.getElementById('chart').offsetWidth)
            .cellHeight(18)
            .transitionDuration(300)
            .setDetailsElement(document.getElementById('details'))
            .setDetailsHandler(function(d) {
                if (d) {
                    document.getElementById('details').innerHTML =
                        d.data.name + ' &mdash; ' + d.data.value + ' thread(s)';
                } else {
                    document.getElementById('details').innerHTML = '';
                }
            });

        d3.select("#chart")
            .datum(data)
            .call(chart);

        document.getElementById("search").addEventListener("input", function() {
            chart.search(this.value);
        });
        document.getElementById("clear").addEventListener("click", function() {
            document.getElementById("search").value = "";
            chart.clear();
        });
        document.getElementById("reset").addEventListener("click", function() {
            chart.resetZoom();
        });

        window.addEventListener("resize", function() {
            chart.width(document.getElementById('chart').offsetWidth);
            d3.select("#chart").datum(data).call(chart);
        });
    </script>
</body>
</html>
